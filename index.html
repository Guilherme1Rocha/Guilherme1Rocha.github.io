<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name — Software Engineer</title>
  <meta name="description" content="Portfolio and contact page for Your Name, Software Engineer." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">

    <p class="eyebrow">Software Engineer</p>

    <!-- REPLACE: your name -->
    <h1 class="name">Your Name<span class="cursor" aria-hidden="true"></span></h1>

    <!-- REPLACE: a short 1–2 sentence bio -->
    <p class="about">
      Short line about what you build, the stack you enjoy, and what
      you're currently focused on.
    </p>

    <nav class="links" aria-label="Contact links">
      <!-- REPLACE: your email -->
      <a href="mailto:you@example.com">Email</a>
      <span class="sep" aria-hidden="true">·</span>
      <!-- REPLACE: your LinkedIn URL -->
      <a href="https://linkedin.com/in/yourusername" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <span class="sep" aria-hidden="true">·</span>
      <!-- REPLACE: your GitHub URL -->
      <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer">GitHub</a>
    </nav>

    <!-- REPLACE: link to your actual CV file (e.g. "cv.pdf" placed next to this HTML file) -->
    <a class="cv-btn" href="cv.pdf" target="_blank" rel="noopener noreferrer">View CV</a>

  </main>
</body>
</html>
